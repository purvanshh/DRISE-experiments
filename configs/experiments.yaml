experiment:
  name: drise_vs_baselines
  resume: false
  dataset:
    train_annotations: data/annotations/train.jsonl
    val_annotations: data/annotations/val.jsonl
    test_annotations: data/annotations/test.jsonl
  systems:
    - llm_only
    - rag_llm
    - drise
  llm:
    backend: nvidia
    model: nv-mistralai/mistral-nemo-12b-instruct
    base_url: https://integrate.api.nvidia.com/v1
    temperature: 0.0
    max_tokens: 512
    cache_dir: experiments/cache/llm
    max_input_tokens: 4000
  retrieval:
    embedder: all-MiniLM-L6-v2
    top_k: 3
    chunk_size: 500
    retrieval_cache_dir: experiments/cache/retrieval
  drise:
    use_layout: true
    use_constraints: true
    local_cost_per_hour: 0.5
  ablation:
    enabled: true
    variants:
      drise_no_layout:
        use_layout: false
        use_constraints: true
      drise_no_constraints:
        use_layout: true
        use_constraints: false
  output_dir: experiments/results
