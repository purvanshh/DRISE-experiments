experiment:
  name: drise_vs_baselines
  seed: 42
  cost_cap_usd: 30.0
  resume: false
  dataset:
    train_annotations: data/annotations/train.jsonl
    val_annotations: data/annotations/val.jsonl
    test_annotations: data/annotations/test.jsonl
  systems:
    - llm_only
    - rag_llm
    - drise
  llm:
    backend: nvidia
    model: meta/llama-3.2-1b-instruct
    base_url: https://integrate.api.nvidia.com/v1
    prompt_variant: strict_v1
    temperature: 0.0
    max_tokens: 256
    field_max_tokens: 128
    cache_dir: experiments/cache/llm
    max_input_tokens: 1500
  retrieval:
    embedder: all-MiniLM-L6-v2
    top_k: 3
    chunk_size: 500
    retrieval_cache_dir: experiments/cache/retrieval
  drise:
    use_layout: true
    use_constraints: true
    local_cost_per_hour: 0.5
  ablation:
    enabled: true
    variants:
      drise_no_layout:
        use_layout: false
        use_constraints: true
      drise_no_constraints:
        use_layout: true
        use_constraints: false
  output_dir: experiments/results
  sensitivity:
    temperatures: [0.0, 0.3, 0.7]
    ocr_noise_factors: [0.0, 0.1, 0.2]
