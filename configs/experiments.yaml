experiment:
  name: drise_vs_baselines
  dataset:
    test_annotations: data/annotations/experiment_sample.jsonl
  systems:
    - llm_only
    - rag_llm
    - drise
  llm:
    backend: mock
    model: mock-llm
    temperature: 0.0
    max_tokens: 512
    cache_dir: experiments/cache/llm
    max_input_tokens: 4000
  retrieval:
    embedder: hashing
    top_k: 3
    chunk_size: 500
    retrieval_cache_dir: experiments/cache/retrieval
  drise:
    use_layout: true
    use_constraints: true
    local_cost_per_hour: 0.5
  output_dir: experiments/results
